<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Guitar Game CCB</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#04040e">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --c0:#ff4466; --c1:#ff8800; --c2:#ffdd00; --c3:#44dd44; --c4:#44aaff; --c5:#cc44ff;
  --g0:rgba(255,68,102,0.8); --g1:rgba(255,136,0,0.8); --g2:rgba(255,221,0,0.8);
  --g3:rgba(68,221,68,0.8); --g4:rgba(68,170,255,0.8); --g5:rgba(204,68,255,0.8);
  --bg:#04040e; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08);
  --txt:#e8e8ff; --dim:rgba(255,255,255,0.35);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--txt);}


/* ── HIGH SCORES ── */
.scores-section{width:100%;max-width:480px;}
.scores-title{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;padding-left:2px;}
.scores-list{display:flex;flex-direction:column;gap:5px;max-height:18vh;overflow-y:auto;}
.scores-list::-webkit-scrollbar{width:3px;}.scores-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.score-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.score-rank{font-family:'Orbitron',monospace;font-size:11px;color:var(--dim);width:18px;text-align:center;flex-shrink:0;}
.score-rank.gold{color:#ffdd00;}.score-rank.silver{color:#aab4be;}.score-rank.bronze{color:#cd7f32;}
.score-song{flex:1;min-width:0;}
.score-song-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-song-meta{font-size:10px;color:var(--dim);}
.score-pts{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#44aaff;flex-shrink:0;}
.score-acc{font-size:10px;color:var(--dim);flex-shrink:0;text-align:right;}

/* ── TELAS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .35s,transform .35s;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97);}

/* ── TELA INICIAL ── */
#screenHome{gap:14px;padding:16px;background:radial-gradient(ellipse at 50% 30%, #0a0a2a 0%, #04040e 70%);}
.logo-wrap{text-align:center;}
.logo-title{font-family:'Orbitron',monospace;font-size:clamp(22px,6.5vw,48px);font-weight:900;
  background:linear-gradient(135deg,#ff4466,#ff8800,#ffdd00,#44dd44,#44aaff,#cc44ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;line-height:1.1;letter-spacing:2px;}
.logo-sub{font-family:'Rajdhani';font-size:14px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-top:4px;}

.song-list{width:100%;max-width:480px;display:flex;flex-direction:column;gap:8px;max-height:52vh;overflow-y:auto;padding-right:4px;}
.song-list::-webkit-scrollbar{width:3px;} .song-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.song-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;position:relative;}
.song-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03));opacity:0;transition:opacity .2s;}
.song-card:hover::before,.song-card:active::before{opacity:1;}
.song-card:hover{border-color:rgba(255,255,255,0.18);transform:translateX(3px);}
.song-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-name{font-size:13px;font-weight:700;white-space:normal;line-height:1.25;color:#e8e8ff;word-break:break-word;}
.song-meta{font-size:10px;color:var(--dim);margin-top:2px;}
.song-diff{display:flex;gap:3px;margin-top:5px;}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
.diff-dot.on{background:#ffdd00;}
.song-play-btn{width:36px;height:36px;border-radius:50%;background:rgba(68,170,255,0.2);border:1.5px solid #44aaff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.song-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px;background:rgba(255,221,0,0.15);border:1px solid rgba(255,221,0,0.4);color:#ffdd00;text-transform:uppercase;margin-top:4px;display:inline-block;}
.empty-list{text-align:center;color:var(--dim);padding:32px 16px;font-size:14px;line-height:1.6;}

.btn-upload{display:flex;align-items:center;gap:10px;padding:14px 28px;background:linear-gradient(135deg,rgba(68,170,255,0.2),rgba(204,68,255,0.2));border:1.5px solid rgba(68,170,255,0.5);border-radius:12px;color:var(--txt);font-family:'Rajdhani';font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn-upload:hover{background:linear-gradient(135deg,rgba(68,170,255,0.35),rgba(204,68,255,0.35));transform:translateY(-2px);}
.btn-upload svg{flex-shrink:0;}
#fileInput{display:none;}

/* ── TELA DO JOGO ── */
#screenGame{padding:0;justify-content:flex-end;background:#04040e;}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}

/* HUD superior */
.hud-top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;z-index:10;background:linear-gradient(to bottom,rgba(4,4,14,0.9),transparent);pointer-events:none;}
.hud-score-wrap{text-align:left;}
.hud-score-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.hud-score{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 20px #44aaff;}
.hud-song-name{font-size:12px;font-weight:700;color:var(--dim);text-align:center;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hud-combo-wrap{text-align:right;}
.hud-combo-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.hud-combo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ffdd00;text-shadow:0 0 20px #ffdd00;}
.hud-streak{width:100%;height:3px;position:absolute;top:0;left:0;background:linear-gradient(90deg,#ff4466,#ff8800,#ffdd00,#44dd44,#44aaff,#cc44ff);transform-origin:left;transition:transform .1s;}

/* Botões das cordas */
.strings-bar{position:absolute;bottom:0;left:0;right:0;display:flex;z-index:10;height:80px;}
/* Botões das cordas — apenas decorativos */
.str-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;position:relative;pointer-events:none;user-select:none;}
.str-btn-circle{width:44px;height:44px;border-radius:50%;border:2.5px solid;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:11px;box-shadow:0 0 12px var(--clr);transition:transform .08s,box-shadow .08s;}
.str-btn-circle.lit{transform:scale(1.15);box-shadow:0 0 28px var(--clr),0 0 56px var(--clr);}
.str-btn-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);}
.str-btn-divider{position:absolute;top:0;right:0;width:1px;height:60%;background:var(--border);}
/* Zona de toque invisível sobre tudo */
#tapZone{position:absolute;inset:0;bottom:80px;z-index:15;cursor:pointer;touch-action:manipulation;}
/* Ripple de feedback ao tocar */
.tap-ripple{position:absolute;border-radius:50%;pointer-events:none;z-index:16;
  width:90px;height:90px;margin-left:-45px;margin-top:-45px;
  border:3px solid #fff;animation:rippleOut .4s ease-out forwards;}
.tap-ripple.hidden{display:none;}
@keyframes rippleOut{from{transform:scale(0.3);opacity:1;}to{transform:scale(1.8);opacity:0;}}
/* Instrução de toque */
.tap-hint{position:absolute;bottom:90px;left:0;right:0;text-align:center;
  font-size:12px;color:rgba(255,255,255,0.25);letter-spacing:2px;pointer-events:none;z-index:11;}

/* Botão de pausa / back */
.btn-pause{position:absolute;top:12px;right:16px;z-index:20;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;}

/* Overlay de pausa */
#pauseOverlay{position:absolute;inset:0;z-index:30;background:rgba(4,4,14,0.85);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#pauseOverlay.hidden{display:none;}
.pause-title{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:#fff;}
.pause-btn{padding:12px 36px;border-radius:10px;border:1.5px solid;font-family:'Rajdhani';font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.pause-btn.resume{background:rgba(68,221,68,0.2);border-color:#44dd44;color:#44dd44;}
.pause-btn.resume:hover{background:rgba(68,221,68,0.35);}
.pause-btn.quit{background:rgba(255,68,102,0.15);border-color:#ff4466;color:#ff4466;}
.pause-btn.quit:hover{background:rgba(255,68,102,0.3);}

/* Overlay de resultado */
#resultOverlay{position:absolute;inset:0;z-index:30;background:rgba(4,4,14,0.92);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#resultOverlay.hidden{display:none;}
.result-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;}
.result-title.perfect{color:#ffdd00;text-shadow:0 0 30px #ffdd00;}
.result-title.great{color:#44dd44;text-shadow:0 0 30px #44dd44;}
.result-title.ok{color:#44aaff;text-shadow:0 0 30px #44aaff;}
.result-title.miss{color:#ff4466;text-shadow:0 0 30px #ff4466;}
.result-stats{display:flex;gap:24px;margin:8px 0;}
.result-stat{text-align:center;}
.result-stat-val{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:#fff;}
.result-stat-lbl{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.result-bar-wrap{width:280px;}
.result-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:4px;}
.result-bar-bg{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.result-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#44aaff,#cc44ff);transition:width 1s ease;}

/* Countdown */
#countdownOverlay{position:absolute;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#countdownOverlay.hidden{display:none;}
.countdown-num{font-family:'Orbitron',monospace;font-size:100px;font-weight:900;color:#fff;text-shadow:0 0 40px #44aaff,0 0 80px #44aaff;animation:countPulse .9s ease-out;}
@keyframes countPulse{from{transform:scale(1.4);opacity:1;}to{transform:scale(0.8);opacity:0;}}

/* Progress bar */
.progress-bar{position:absolute;bottom:80px;left:0;right:0;height:3px;background:rgba(255,255,255,0.08);z-index:10;}
.progress-fill{height:100%;background:linear-gradient(90deg,#44aaff,#cc44ff);width:0%;transition:width .25s linear;}

/* Toast */
#toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,0.95);border:1px solid var(--border);border-radius:8px;padding:8px 20px;font-size:13px;color:var(--txt);z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── BOTÕES EXTRAS (Ko-fi / PIX / Install) ── */
.extra-btns{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;width:100%;max-width:480px;}
.btn-pix{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;background:linear-gradient(135deg,rgba(0,189,166,0.25),rgba(0,189,166,0.12));border:1.5px solid #00bda6;color:#00e5cc;font-family:'Rajdhani';font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;text-decoration:none;transition:all .2s;}
.btn-pix:hover{background:linear-gradient(135deg,rgba(0,189,166,0.4),rgba(0,189,166,0.25));transform:translateY(-2px);box-shadow:0 0 16px rgba(0,189,166,0.4);}
.btn-install{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;background:linear-gradient(135deg,rgba(68,170,255,0.2),rgba(204,68,255,0.2));border:1.5px solid rgba(204,68,255,0.6);color:#cc44ff;font-family:'Rajdhani';font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;}
.btn-install:hover{background:linear-gradient(135deg,rgba(68,170,255,0.35),rgba(204,68,255,0.35));transform:translateY(-2px);box-shadow:0 0 16px rgba(204,68,255,0.4);}
.btn-install.hidden{display:none!important;}

/* Modal PIX */
#pixModal{position:fixed;inset:0;z-index:100;background:rgba(4,4,14,0.88);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;}
#pixModal.hidden{display:none;}
.pix-box{background:#0a0a1e;border:1px solid rgba(0,189,166,0.4);border-radius:16px;padding:28px 32px;max-width:340px;width:90%;text-align:center;box-shadow:0 0 40px rgba(0,189,166,0.15);}
.pix-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#00e5cc;letter-spacing:2px;margin-bottom:4px;}
.pix-sub{font-size:12px;color:var(--dim);margin-bottom:20px;}
.pix-key-box{background:rgba(0,189,166,0.08);border:1px solid rgba(0,189,166,0.25);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.pix-key-label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.pix-key{font-family:monospace;font-size:15px;color:#00e5cc;word-break:break-all;user-select:all;}
.pix-copy-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:8px;background:linear-gradient(135deg,rgba(0,189,166,0.3),rgba(0,189,166,0.15));border:1.5px solid #00bda6;color:#00e5cc;font-family:'Rajdhani';font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;margin-bottom:16px;}
.pix-copy-btn:hover{background:linear-gradient(135deg,rgba(0,189,166,0.5),rgba(0,189,166,0.3));}
.pix-close{font-size:12px;color:var(--dim);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Rajdhani';}
.pix-close:hover{color:var(--txt);}
</style>
</head>
<body>

<!-- ══════════════ TELA INICIAL ══════════════ -->
<div id="screenHome" class="screen">
  <div class="logo-wrap">
    <div class="logo-title">GUITAR GAME CCB</div>
    <div class="logo-sub">Guitar Hero · MIDI</div>
  </div>

  <div class="song-list" id="songList">
    <div class="empty-list">
      🎸 Nenhuma música carregada ainda<br>
      <span style="font-size:12px">Faça upload de um arquivo <strong>.mid</strong> para começar</span>
    </div>
  </div>

  <div class="scores-section" id="scoresSection" style="display:none">
    <div class="scores-title">🏆 Melhores Pontuações</div>
    <div class="scores-list" id="scoresList"></div>
  </div>

  <label class="btn-upload" for="fileInput">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Carregar MIDI
  </label>
  <input type="file" id="fileInput" accept=".mid,.midi" multiple>

  <!-- Botões extras -->
  <div class="extra-btns">
<button class="btn-pix" id="btnPix">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      PIX
    </button>
    <button class="btn-install hidden" id="btnInstall">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Instalar App
    </button>
  </div>
</div>

<!-- ══════════════ MODAL PIX ══════════════ -->
<div id="pixModal" class="hidden">
  <div class="pix-box">
    <div class="pix-title">☕ PIX</div>
    <div class="pix-sub">Ajude a manter o projeto vivo!</div>
    <div class="pix-key-box">
      <div class="pix-key-label">Chave PIX</div>
      <div class="pix-key" id="pixKeyText">meuidwp@duck.com</div>
    </div>
    <button class="pix-copy-btn" id="btnCopyPix">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copiar chave
    </button>
    <br>
    <button class="pix-close" id="btnClosePix">Fechar</button>
  </div>
</div>

<!-- ══════════════ TELA DO JOGO ══════════════ -->
<div id="screenGame" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div class="hud-streak" id="hudStreak" style="transform:scaleX(0)"></div>

  <div class="hud-top">
    <div class="hud-score-wrap">
      <div class="hud-score-label">Score</div>
      <div class="hud-score" id="hudScore">0</div>
    </div>
    <div class="hud-song-name" id="hudSongName">—</div>
    <div class="hud-combo-wrap">
      <div class="hud-combo-label">Combo</div>
      <div class="hud-combo" id="hudCombo">x0</div>
    </div>
  </div>

  <button class="btn-pause" id="btnPause">⏸</button>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <!-- Zona de toque — qualquer toque/clique acerta a nota -->
  <div id="tapZone"></div>
  <!-- Indicador de tap visual -->
  <div id="tapRipple" class="tap-ripple hidden"></div>
  <!-- Cordas decorativas (só visual) -->
  <div class="strings-bar" id="stringsBar"></div>

  <!-- Contagem regressiva -->
  <div id="countdownOverlay" class="hidden">
    <div class="countdown-num" id="countdownNum">3</div>
  </div>

  <!-- Pausa -->
  <div id="pauseOverlay" class="hidden">
    <div class="pause-title">PAUSA</div>
    <button class="pause-btn resume" id="btnResume">▶ Continuar</button>
    <button class="pause-btn quit" id="btnQuit">✕ Sair</button>
  </div>

  <!-- Resultado -->
  <div id="resultOverlay" class="hidden">
    <div class="result-title" id="resultTitle">SHOW!</div>
    <div class="result-stats">
      <div class="result-stat"><div class="result-stat-val" id="resFinalScore">0</div><div class="result-stat-lbl">Score</div></div>
      <div class="result-stat"><div class="result-stat-val" id="resMaxCombo">0</div><div class="result-stat-lbl">Max Combo</div></div>
      <div class="result-stat"><div class="result-stat-val" id="resAccuracy">0%</div><div class="result-stat-lbl">Precisão</div></div>
    </div>
    <div class="result-bar-wrap">
      <div class="result-bar-label"><span>Notas acertadas</span><span id="resHitCount">0/0</span></div>
      <div class="result-bar-bg"><div class="result-bar-fill" id="resBar" style="width:0%"></div></div>
    </div>
    <button class="pause-btn resume" id="btnPlayAgain" style="margin-top:8px">↺ Jogar Novamente</button>
    <button class="pause-btn quit" id="btnBackHome">⌂ Início</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// CONSTANTES
// ══════════════════════════════════════════════════════
const STR_MIDI  = [40, 45, 50, 55, 59, 64]; // E2 A2 D3 G3 B3 e4
const STR_NAMES = ['E','A','D','G','B','e'];
const STR_COLS  = ['#ff4466','#ff8800','#ffdd00','#44dd44','#44aaff','#cc44ff'];
const STR_GLOWS = ['rgba(255,68,102','rgba(255,136,0','rgba(255,221,0','rgba(68,221,68','rgba(68,170,255','rgba(204,68,255'];

const HIT_WINDOW   = 0.18;  // segundos de tolerância para acerto
const NOTE_SPEED   = 280;   // px/s
const HIT_Y_RATIO  = 0.84;  // posição vertical da hit zone (% da altura da canvas)
const LEAD_IN      = 3.0;   // segundos de contagem antes da música

// ══════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════
let songs       = [];   // [{name, notes}]
let currentSong = null;
let notes       = [];   // [{string, fret, time, hit, missed}]
let curTime     = -LEAD_IN;
let playing     = false;
let paused      = false;
let animId      = null;
let lastTS      = 0;
let score       = 0;
let combo       = 0;
let maxCombo    = 0;
let totalHits   = 0;
let totalMisses = 0;
let particles   = [];
let hitAnims    = [];
let strPressed = new Array(6).fill(false);

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0, HIT_Y = 0;
let trackW  = 0, PAD_L = 0, PAD_R = 0, VP_Y = 0;

// ══════════════════════════════════════════════════════
// AUDIO — Guitarra sintética com nota MIDI exata
// ══════════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Masterbus com leve compressão
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 6;
    comp.ratio.value = 3; comp.attack.value = 0.003; comp.release.value = 0.15;
    comp.connect(audioCtx.destination);
    audioCtx._out = comp;
  }
  return audioCtx;
}

// Converte número de nota MIDI para frequência Hz
function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

// Número MIDI exato da nota: corda + fret
function noteToMidi(strIdx, fret) {
  return STR_MIDI[strIdx] + fret;
}

// Sintetiza timbre de guitarra: fundamental + harmônicos + pluck envelope
function playGuitarNote(midiNote, duration, gainScale) {
  gainScale = gainScale || 1.0;
  try {
    const ac = getAudioCtx();
    const freq = midiToFreq(midiNote);
    const out = ac._out;
    const now = ac.currentTime;
    const dur = Math.max(0.3, Math.min(duration || 1.0, 2.5));

    // Gain master da nota
    const masterGain = ac.createGain();
    masterGain.connect(out);
    // Envelope tipo pluck: ataque instantâneo, decay rápido, sustain leve
    masterGain.gain.setValueAtTime(0, now);
    masterGain.gain.linearRampToValueAtTime(0.22 * gainScale, now + 0.004);
    masterGain.gain.exponentialRampToValueAtTime(0.10, now + 0.08);
    masterGain.gain.exponentialRampToValueAtTime(0.04, now + dur * 0.6);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    // Fundamental
    const osc1 = ac.createOscillator();
    const g1 = ac.createGain();
    osc1.type = 'sawtooth';
    osc1.frequency.value = freq;
    g1.gain.value = 0.7;
    osc1.connect(g1); g1.connect(masterGain);
    osc1.start(now); osc1.stop(now + dur + 0.05);

    // 2º harmônico (oitava)
    const osc2 = ac.createOscillator();
    const g2 = ac.createGain();
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 2;
    g2.gain.value = 0.25;
    osc2.connect(g2); g2.connect(masterGain);
    osc2.start(now); osc2.stop(now + dur * 0.7 + 0.05);

    // 3º harmônico
    const osc3 = ac.createOscillator();
    const g3 = ac.createGain();
    osc3.type = 'sine';
    osc3.frequency.value = freq * 3;
    g3.gain.value = 0.10;
    osc3.connect(g3); g3.connect(masterGain);
    osc3.start(now); osc3.stop(now + dur * 0.4 + 0.05);

    // Filtro passa-baixa para suavizar (guitarra não é brilhante demais)
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 3000 + freq * 2;
    filter.Q.value = 0.8;
    // Reconecta passando pelo filtro
    g1.disconnect(); g2.disconnect(); g3.disconnect();
    g1.connect(filter); g2.connect(filter); g3.connect(filter);
    filter.connect(masterGain);

  } catch(e) { console.warn('Audio error:', e); }
}

function playHitSound(strIdx, fret, gainScale) {
  const midi = noteToMidi(strIdx, fret != null ? fret : 0);
  playGuitarNote(midi, 0.9, gainScale || 1.0);
}

function playGroupHit(group) {
  // Ajusta volume por nota para não saturar em acordes
  const scale = group.length > 1 ? 0.7 / Math.sqrt(group.length) : 1.0;
  group.forEach(n => playHitSound(n.string, n.fret, scale));
}

function playMissSound() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac._out || ac.destination);
    osc.frequency.value = 55;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.06, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.18);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.2);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
// PARSEMIDI (idêntico ao app original corrigido)
// ══════════════════════════════════════════════════════
function parseMIDIBytes(data) {
  let p = 0;
  const r8  = () => data[p++];
  const rVL = () => { let v=0,b; do { b=r8(); v=(v<<7)|(b&0x7F); } while(b&0x80); return v; };
  if (String.fromCharCode(data[0],data[1],data[2],data[3]) !== 'MThd') throw new Error('Not MIDI');
  p += 8; r8(); r8();
  const nT = (r8()<<8)|r8(), div = (r8()<<8)|r8();
  const tpb = (div & 0x8000) ? 480 : div;
  let tempo = 500000; const evs = [];
  for (let t = 0; t < nT; t++) {
    let found = false;
    for (let s = 0; s < 20; s++) {
      if (p + 4 >= data.length) break;
      if (String.fromCharCode(data[p],data[p+1],data[p+2],data[p+3]) === 'MTrk') { found=true; break; }
      p += 4; p += (r8()<<24)|(r8()<<16)|(r8()<<8)|r8();
    }
    if (!found) break; p += 4;
    const tL=(r8()<<24)|(r8()<<16)|(r8()<<8)|r8(); const tE=p+tL; let aT=0,rS=0;
    while (p < tE) {
      const d=rVL(); aT+=d; let sb=data[p];
      if (sb<0x80){sb=rS;}else{rS=sb;p++;}
      const cmd=sb>>4;
      if (cmd===0x9) {
        const note=r8(),vel=r8();
        if (vel>0) {
          let bs=0,bf=99;
          for (let s=0;s<STR_MIDI.length;s++){const f=note-STR_MIDI[s];if(f>=0&&f<=20&&f<bf){bs=s;bf=f;}}
          bf=Math.max(0,Math.min(20,bf));
          evs.push({time:(aT/tpb)*(tempo/1000000),string:bs,fret:bf});
        }
      }
      else if(cmd===0x8||cmd===0xA||cmd===0xB||cmd===0xE){r8();r8();}
      else if(cmd===0xC||cmd===0xD){r8();}
      else if(sb===0xFF){const mt=r8(),ml=rVL();if(mt===0x51&&ml===3)tempo=(data[p]<<16)|(data[p+1]<<8)|data[p+2];p+=ml;}
      else if(sb===0xF0||sb===0xF7){const sl=rVL();p+=sl;}
    }
    p=tE;
  }
  if (!evs.length) throw new Error('Sem notas');
  evs.sort((a,b)=>a.time-b.time);
  // Deduplicar notas muito próximas na mesma corda
  const out=[];
  for(let i=0;i<evs.length;i++){
    if(i>0&&evs[i].time-evs[i-1].time<0.02&&evs[i].string===evs[i-1].string) continue;
    out.push({...evs[i], hit:false, missed:false});
  }
  return out;
}

// ══════════════════════════════════════════════════════
// UPLOAD DE ARQUIVO
// ══════════════════════════════════════════════════════
document.getElementById('fileInput').addEventListener('change', function(e) {
  const files = [...e.target.files];
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const notesParsed = parseMIDIBytes(new Uint8Array(ev.target.result));
        const name = file.name.replace(/\.(mid|midi)$/i,'');
        // Não duplicar
        if (!songs.find(s=>s.name===name)) {
          const dur = notesParsed[notesParsed.length-1].time + 1;
          songs.push({name, notes: notesParsed, dur});
        }
        loaded++;
        if (loaded === files.length) { renderSongList(); showToast(`✅ ${loaded} música(s) carregada(s)`); }
      } catch(err) {
        showToast('❌ Erro ao ler MIDI: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  });
  this.value='';
});

// ══════════════════════════════════════════════════════
// LISTA DE MÚSICAS
// ══════════════════════════════════════════════════════
function renderSongList() {
  const el = document.getElementById('songList');
  if (!songs.length) {
    el.innerHTML = '<div class="empty-list">🎸 Nenhuma música carregada ainda<br><span style="font-size:12px">Faça upload de um arquivo <strong>.mid</strong> para começar</span></div>';
    return;
  }
  el.innerHTML = songs.map((s,i) => {
    const dur = Math.floor(s.dur/60)+':'+(Math.floor(s.dur%60)+'').padStart(2,'0');
    const noteCount = s.notes.length;
    // Dificuldade estimada por densidade (notas/segundo)
    const density = noteCount / s.dur;
    const diffLevel = density < 1 ? 1 : density < 2 ? 2 : density < 3.5 ? 3 : density < 5 ? 4 : 5;
    const dots = Array(5).fill(0).map((_,d)=>`<div class="diff-dot${d<diffLevel?' on':''}"></div>`).join('');
    // Ícone baseado no tipo da música
    const icon = s.name.toLowerCase().includes('fingerstyle') ? '🎸'
               : s.name.toLowerCase().includes('baixo') ? '🎵'
               : '🎼';
    const badge = s.builtin ? `<span class="song-badge">⭐ Biblioteca</span>` : '';
    return `<div class="song-card" onclick="startSong(${i})">
      <div class="song-icon">${icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:#e8e8ff;line-height:1.3;margin-bottom:2px;">${s.name}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.4);">${noteCount} notas · ${dur}</div>
        <div style="display:flex;gap:3px;margin-top:4px;align-items:center;">${dots}${badge}</div>
      </div>
      <div class="song-play-btn">▶</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// INICIAR JOGO
// ══════════════════════════════════════════════════════
function startSong(idx) {
  currentSong = songs[idx];
  notes = currentSong.notes.map(n=>({...n, hit:false, missed:false}));
  score=0; combo=0; maxCombo=0; totalHits=0; totalMisses=0;
  curTime=-LEAD_IN; playing=false; paused=false; particles=[]; hitAnims=[];
  strPressed.fill(false);

  document.getElementById('hudSongName').textContent = currentSong.name;
  updateHUD();

  showScreen('screenGame');
  resizeCanvas();
  buildStringsBar();
  setupTapZone();

  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('pauseOverlay').classList.add('hidden');

  startCountdown();
}

function startCountdown() {
  const overlay = document.getElementById('countdownOverlay');
  const numEl   = document.getElementById('countdownNum');
  overlay.classList.remove('hidden');
  let count = 3;
  numEl.textContent = count;
  // Force reflow for animation restart
  numEl.style.animation='none'; numEl.offsetHeight; numEl.style.animation='';
  const tick = setInterval(()=>{
    count--;
    if (count <= 0) {
      clearInterval(tick);
      overlay.classList.add('hidden');
      beginPlay();
    } else {
      numEl.textContent = count;
      numEl.style.animation='none'; numEl.offsetHeight; numEl.style.animation='countPulse .9s ease-out';
    }
  }, 900);
}

function beginPlay() {
  playing=true; lastTS=0;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════════════════
// LOOP PRINCIPAL
// ══════════════════════════════════════════════════════
function gameLoop(ts) {
  if (!playing || paused) { animId=requestAnimationFrame(gameLoop); return; }
  const dt = lastTS ? Math.min((ts-lastTS)/1000, 0.05) : 0.016;
  lastTS = ts;
  curTime += dt;

  // Checar notas perdidas
  for (const n of notes) {
    if (!n.hit && !n.missed && n.time < curTime - HIT_WINDOW) {
      n.missed = true;
      totalMisses++;
      combo = 0;
      updateHUD();
      spawnMissAnim();
    }
  }

  // Atualizar partículas
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; p.life-=dt*1.8;
    if(p.life<=0) particles.splice(i,1);
  }
  for (let i=hitAnims.length-1;i>=0;i--) {
    hitAnims[i].life-=dt*2.2; if(hitAnims[i].life<=0) hitAnims.splice(i,1);
  }

  // Progresso
  const tMax = currentSong.dur;
  const pct = Math.max(0, curTime) / tMax * 100;
  document.getElementById('progressFill').style.width = Math.min(100,pct)+'%';

  draw();

  // Fim da música
  if (curTime > tMax + 1.5) { endGame(); return; }

  animId = requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════════════════
// CANVAS E DESENHO
// ══════════════════════════════════════════════════════
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.offsetWidth; H = canvas.offsetHeight;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  HIT_Y  = H * HIT_Y_RATIO;
  PAD_L  = 4; PAD_R = 4;
  trackW = (W - PAD_L - PAD_R) / 6;
  VP_Y   = H * 0.04;
}
window.addEventListener('resize', ()=>{ if(document.getElementById('screenGame').style.display!='none') resizeCanvas(); });

function trackX(str, y) {
  // Perspectiva: trilhas convergem para ponto de fuga no topo
  const progress = Math.max(0, Math.min(1, (y-VP_Y)/(HIT_Y-VP_Y)));
  const totalWTop = (W - PAD_L - PAD_R) * 0.38;
  const topX0 = W/2 - totalWTop/2;
  const botX0 = PAD_L;
  const xLeft = botX0 + (topX0 - botX0) * (1 - progress);
  const xWidth = (trackW * 6) * (1 - 0.62*(1-progress));
  return xLeft + (str + 0.5) * (xWidth / 6);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Fundo
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#02020a'); bg.addColorStop(0.6,'#04041a'); bg.addColorStop(1,'#06062a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  drawNeck();
  drawNotes();
  drawHitZone();
  drawParticles();
  drawHitAnims();
}

function drawNeck() {
  const totalWTop = (W - PAD_L - PAD_R) * 0.38;
  const topX0 = W/2 - totalWTop/2, topX1 = W/2 + totalWTop/2;

  // Corpo do braço
  const neckGrad = ctx.createLinearGradient(0, VP_Y, 0, HIT_Y);
  neckGrad.addColorStop(0,'rgba(6,6,30,0.92)');
  neckGrad.addColorStop(1,'rgba(12,12,50,0.88)');
  ctx.fillStyle=neckGrad;
  ctx.beginPath();
  ctx.moveTo(topX0,VP_Y); ctx.lineTo(topX1,VP_Y);
  ctx.lineTo(PAD_L+trackW*6,HIT_Y); ctx.lineTo(PAD_L,HIT_Y);
  ctx.closePath(); ctx.fill();

  // Linhas horizontais (trastes)
  for(let i=0;i<=14;i++){
    const t=i/14;
    const rawY=VP_Y+(HIT_Y-VP_Y)*Math.pow(t,1.7);
    const prog=(rawY-VP_Y)/(HIT_Y-VP_Y);
    const lw=totalWTop+(trackW*6-totalWTop)*prog;
    const lx=W/2-lw/2;
    ctx.strokeStyle=`rgba(80,120,255,${0.05+0.22*prog})`;
    ctx.lineWidth=0.7+prog*0.9;
    ctx.beginPath(); ctx.moveTo(lx,rawY); ctx.lineTo(lx+lw,rawY); ctx.stroke();
  }

  // Linhas verticais das cordas
  for(let s=0;s<=6;s++){
    const col = s<6 ? STR_COLS[s] : STR_COLS[5];
    ctx.strokeStyle = s<6 ? col+'33' : 'transparent';
    ctx.lineWidth=0.8;
    ctx.beginPath();
    ctx.moveTo(trackX(s-0.5,HIT_Y),HIT_Y);
    ctx.lineTo(trackX(s-0.5,VP_Y),VP_Y);
    ctx.stroke();
  }
}

function drawHitZone() {
  // Linha de acerto
  const hg = ctx.createLinearGradient(PAD_L,0,PAD_L+trackW*6,0);
  hg.addColorStop(0,'rgba(255,255,255,0)');
  hg.addColorStop(0.1,'rgba(255,255,255,0.6)');
  hg.addColorStop(0.5,'#ffffff');
  hg.addColorStop(0.9,'rgba(255,255,255,0.6)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.strokeStyle=hg; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD_L,HIT_Y); ctx.lineTo(PAD_L+trackW*6,HIT_Y); ctx.stroke();

  // Alvos de cada corda
  for(let s=0;s<6;s++){
    const cx=trackX(s,HIT_Y);
    const col=STR_COLS[s];
    const pressed=strPressed[s];

    ctx.shadowColor=col; ctx.shadowBlur= pressed?30:10;
    // Anel
    ctx.beginPath(); ctx.arc(cx,HIT_Y,pressed?20:16,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=pressed?3:2; ctx.stroke();
    // Interior
    ctx.beginPath(); ctx.arc(cx,HIT_Y,pressed?17:13,0,Math.PI*2);
    ctx.fillStyle=pressed?col+'99':'rgba(0,0,0,0.4)'; ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawNotes() {
  for(const n of notes){
    if(n.hit||n.missed) continue;
    const dt = n.time - curTime;
    if(dt > H/NOTE_SPEED + 0.5 || dt < -HIT_WINDOW*2) continue;

    const y = HIT_Y - dt*NOTE_SPEED;
    if(y < VP_Y-30 || y > H+20) continue;

    const cx = trackX(n.string, y);
    const col = STR_COLS[n.string];
    const prog = Math.max(0.2, Math.min(1, (y-VP_Y)/(HIT_Y-VP_Y)));
    const r = 10 + 12*prog;

    // Brilho
    ctx.shadowColor=col; ctx.shadowBlur=12+18*prog;

    // Corpo
    const ng=ctx.createRadialGradient(cx-r*.3,y-r*.3,0,cx,y,r);
    ng.addColorStop(0,'#ffffff'); ng.addColorStop(0.4,col); ng.addColorStop(1,col+'88');
    ctx.beginPath(); ctx.arc(cx,y,r,0,Math.PI*2);
    ctx.fillStyle=ng; ctx.fill();

    // Anel
    ctx.strokeStyle='#fff'; ctx.lineWidth=1+prog; ctx.stroke();
    ctx.shadowBlur=0;

    // Número do fret
    if(prog > 0.35){
      const fs=Math.max(8,Math.round(14*prog));
      ctx.font=`900 ${fs}px Orbitron,monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#000'; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=Math.max(1,fs*.25);
      ctx.strokeText(n.fret.toString(),cx,y);
      ctx.fillText(n.fret.toString(),cx,y);
    }
  }
}

function drawParticles() {
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*Math.max(0.1,p.life),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHitAnims() {
  for(const h of hitAnims){
    ctx.globalAlpha=Math.min(1,h.life);
    ctx.shadowColor=h.color; ctx.shadowBlur=20;
    ctx.fillStyle=h.color;
    ctx.font=`900 ${Math.round(h.size+(1-h.life)*6)}px Orbitron,monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(h.text, h.x, h.y-(1-h.life)*40);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
}

// ══════════════════════════════════════════════════════
// INTERAÇÃO — TOQUE EM QUALQUER LUGAR DA TELA
// Grupos simultâneos = 1 toque só
// Desktop: Tab ou Espaço
// ══════════════════════════════════════════════════════

function buildStringsBar() {
  const bar = document.getElementById('stringsBar');
  bar.innerHTML = '';
  for(let s=0;s<6;s++){
    const div=document.createElement('div');
    div.className='str-btn';
    div.style.setProperty('--clr',STR_COLS[s]);
    div.innerHTML=`
      <div class="str-btn-circle" id="strCircleInner${s}" style="border-color:${STR_COLS[s]};color:${STR_COLS[s]};background:${STR_COLS[s]}22">${STR_NAMES[s]}</div>
      <div class="str-btn-label">${STR_NAMES[s]}</div>
      ${s<5?'<div class="str-btn-divider"></div>':''}`;
    bar.appendChild(div);
  }
  // Dica de toque
  const existing = document.getElementById('tapHint');
  if(!existing){
    const hint = document.createElement('div');
    hint.className='tap-hint'; hint.id='tapHint';
    hint.textContent='▼  TOQUE NA TELA PARA TOCAR  ▼';
    document.getElementById('screenGame').appendChild(hint);
  }
}

function lightStrings(group, duration=350) {
  const strings=[...new Set(group.map(n=>n.string))];
  strings.forEach(s=>{
    const el=document.getElementById(`strCircleInner${s}`);
    if(el){ el.classList.add('lit'); setTimeout(()=>el.classList.remove('lit'),duration); }
  });
}

function showTapRipple(x,y) {
  const r=document.getElementById('tapRipple');
  if(!r) return;
  r.style.left=x+'px'; r.style.top=y+'px';
  r.classList.remove('hidden');
  r.style.animation='none'; r.offsetHeight;
  r.style.animation='rippleOut .4s ease-out forwards';
  setTimeout(()=>r.classList.add('hidden'),420);
}

function tryTap(tapX, tapY) {
  if(!playing||paused||curTime<0) return;
  const pending=notes.filter(n=>!n.hit&&!n.missed);
  if(!pending.length) return;

  // Nota mais próxima do curTime
  pending.sort((a,b)=>Math.abs(a.time-curTime)-Math.abs(b.time-curTime));
  const best=pending[0];
  const bestDt=Math.abs(best.time-curTime);

  showTapRipple(tapX||W/2, tapY||HIT_Y);

  if(bestDt>HIT_WINDOW){
    if(combo>0){ combo=Math.max(0,combo-1); updateHUD(); }
    playMissSound();
    return;
  }

  // Grupo simultâneo: todas notas dentro de 80ms da mais próxima
  const GROUP_THRESHOLD=0.08;
  const group=pending.filter(n=>Math.abs(n.time-best.time)<GROUP_THRESHOLD);

  group.forEach(n=>{ n.hit=true; totalHits++; });
  combo++; if(combo>maxCombo) maxCombo=combo;
  const pts=100*group.length*Math.max(1,Math.floor(combo/5));
  score+=pts;
  updateHUD();

  // Tocar TODAS as notas do grupo simultaneamente com volume balanceado
  playGroupHit(group);

  lightStrings(group);
  group.forEach(n=>spawnHitParticles(trackX(n.string,HIT_Y),HIT_Y,STR_COLS[n.string]));
  const label=bestDt<0.05?'PERFECT!':(bestDt<0.10?'GREAT!':'GOOD!');
  spawnHitText(W/2, HIT_Y-60, label, '#ffffff');
}

function setupTapZone() {
  const zone=document.getElementById('tapZone');
  if(!zone) return;
  zone.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    tryTap(t.clientX,t.clientY);
  },{passive:false});
  zone.addEventListener('mousedown',e=>tryTap(e.clientX,e.clientY));
}

// Desktop: Tab ou Espaço
let tabKeyDown=false;
document.addEventListener('keydown',ev=>{
  if((ev.key==='Tab'||ev.key===' ')&&!tabKeyDown){
    ev.preventDefault(); tabKeyDown=true;
    tryTap(W/2,HIT_Y);
  }
});
document.addEventListener('keyup',ev=>{
  if(ev.key==='Tab'||ev.key===' ') tabKeyDown=false;
});
// ══════════════════════════════════════════════════════
// EFEITOS VISUAIS
// ══════════════════════════════════════════════════════
function spawnHitParticles(x, y, col) {
  for(let i=0;i<12;i++){
    const a=(Math.PI*2*i/12)+Math.random()*.5;
    const sp=80+Math.random()*120;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,r:3+Math.random()*3,color:col,life:1});
  }
}
function spawnHitText(x, y, text, color) {
  hitAnims.push({x,y,text,color,life:1,size:18});
}
function spawnMissAnim() {
  hitAnims.push({x:W/2,y:H*.45,text:'MISS',color:'#ff4466',life:1,size:22});
}

// ══════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('hudScore').textContent=score.toLocaleString();
  document.getElementById('hudCombo').textContent='x'+(combo||0);
  const maxC=notes.length;
  const streak=maxC>0?Math.min(1,combo/Math.max(1,Math.ceil(maxC*.1))):0;
  document.getElementById('hudStreak').style.transform=`scaleX(${streak})`;
}

// ══════════════════════════════════════════════════════
// FIM DE JOGO
// ══════════════════════════════════════════════════════
function endGame(){
  playing=false; cancelAnimationFrame(animId);
  const total=notes.length;
  const acc=total>0?Math.round(totalHits/total*100):0;
  const title=acc>=95?'INCRÍVEL! 🔥':acc>=80?'SHOW! 🎸':acc>=60?'BOA! 👍':'CONTINUE TENTANDO 💪';
  const cls=acc>=95?'perfect':acc>=80?'great':acc>=60?'ok':'miss';

  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultTitle').className='result-title '+cls;
  document.getElementById('resFinalScore').textContent=score.toLocaleString();
  document.getElementById('resMaxCombo').textContent=maxCombo;
  document.getElementById('resAccuracy').textContent=acc+'%';
  document.getElementById('resHitCount').textContent=totalHits+'/'+total;
  document.getElementById('resultOverlay').classList.remove('hidden');
  setTimeout(()=>{ document.getElementById('resBar').style.width=acc+'%'; },100);
  // Salvar pontuação
  saveScore(currentSong.name, score, acc, maxCombo);
}

});

document.getElementById('btnPlayAgain').addEventListener('click',()=>{

});

function goHome(){
  playing=false; paused=false; cancelAnimationFrame(animId);
  document.getElementById('pauseOverlay').classList.add('hidden');
  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('countdownOverlay').classList.add('hidden');
  showScreen('screenHome');
  renderScores();
}

// CARREGAR BIBLIOTECA EMBUTIDA
// ══════════════════════════════════════════════════════
function loadLibrary() {
  const icons = ['🎵','🎶','🎸','🎼','🎹','🎺','🎻','🎷'];
  LIBRARY.forEach((item, i) => {
    try {
      const bytes = Uint8Array.from(atob(item.b64), c => c.charCodeAt(0));
      const notesParsed = parseMIDIBytes(bytes);
      if (!songs.find(s => s.name === item.name)) {
        const dur = notesParsed[notesParsed.length - 1].time + 1;
        songs.push({ name: item.name, notes: notesParsed, dur, builtin: true });
      }
    } catch(e) {
      console.warn('Erro ao carregar ' + item.name + ':', e);
    }
  });
  renderSongList();
}

// ══════════════════════════════════════════════════════
// HIGH SCORES — armazenamento local
// ══════════════════════════════════════════════════════
const HS_KEY = 'guitarGameCCB_scores';

function loadScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; }
  catch(e) { return []; }
}

function saveScore(songName, score, accuracy, maxCombo) {
  const scores = loadScores();
  scores.push({ songName, score, accuracy, maxCombo, date: new Date().toLocaleDateString('pt-BR') });
  // Ordenar por pontuação, manter top 20
  scores.sort((a,b) => b.score - a.score);
  const top = scores.slice(0, 20);
  localStorage.setItem(HS_KEY, JSON.stringify(top));
  return top;
}

function renderScores() {
  const scores = loadScores();
  const section = document.getElementById('scoresSection');
  const list = document.getElementById('scoresList');
  if (!scores.length) { section.style.display='none'; return; }
  section.style.display='block';
  const rankClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const rankLabel = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
  list.innerHTML = scores.map((s,i) => `
    <div class="score-row">
      <div class="score-rank ${rankClass(i)}">${rankLabel(i)}</div>
      <div class="score-song">
        <div class="score-song-name">${s.songName}</div>
        <div class="score-song-meta">${s.date} · Combo x${s.maxCombo}</div>
      </div>
      <div>
        <div class="score-pts">${s.score.toLocaleString()}</div>
        <div class="score-acc">${s.accuracy}%</div>
      </div>
    </div>`).join('');
}

// PWA INSTALL BUTTON
// ══════════════════════════════════════════════════════
let deferredInstallPrompt = null;
const btnInstall = document.getElementById('btnInstall');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  btnInstall.classList.remove('hidden');
});

btnInstall.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') {
    btnInstall.classList.add('hidden');
    deferredInstallPrompt = null;
  }
});

window.addEventListener('appinstalled', () => {
  btnInstall.classList.add('hidden');
  deferredInstallPrompt = null;
});
